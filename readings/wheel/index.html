<!-- 본문(찍히는 글자)용 무거운 한글 디스플레이 폰트 + 우측 패널용 본문 폰트 -->

<style>
  /* ============================================================
     스크린 책 100프로젝트 · 공통 규격(크롬) — main/index.html 양식
     ============================================================ */
  :root{
    --ink:#141414; --bg:#cdc7ba; --dim:#7d776c;
    --pink:#ff5bd1; --pad:clamp(14px,1.6vw,30px);
    --mono:ui-monospace,"SFMono-Regular",Menlo,Consolas,monospace;
  }
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{height:100%;overflow:hidden;background:#bdb6a7}
  body{
    font-family:var(--mono); color:var(--ink);
    -webkit-user-select:none;user-select:none;
    -webkit-tap-highlight-color:transparent; touch-action:none;
    -moz-osx-font-smoothing:grayscale; -webkit-font-smoothing:antialiased;
  }

  /* three.js 캔버스 */
  #scene{position:fixed;inset:0;z-index:2;cursor:grab}
  #scene:active{cursor:grabbing}
  #scene canvas{display:block;width:100%;height:100%}

  /* 첫 진입 안내 */
  #hint{
    position:fixed;left:50%;bottom:64px;transform:translateX(-50%);
    z-index:9;font-size:13px;color:#3f3a31;letter-spacing:.04em;
    transition:opacity .8s;pointer-events:none;text-align:center;
    text-shadow:0 1px 2px rgba(255,255,255,.45); line-height:1.7;
    font-family:var(--mono);
  }
  #hint.gone{opacity:0}

  /* 줌 게이지 (좌측 하단) — 1인칭 ↔ 탑뷰 */
  #zoom{
    position:fixed;left:var(--pad);bottom:var(--pad);z-index:10;
    pointer-events:none;font-size:11px;letter-spacing:.12em;color:#3f3a31;
    text-shadow:0 1px 2px rgba(255,255,255,.4)
  }
  #zoom .bar{margin-top:6px;width:120px;height:3px;background:rgba(20,20,20,.25);position:relative}
  #zoom .bar i{position:absolute;left:0;top:0;bottom:0;background:var(--ink);width:0%}

  /* dev-grid (장식) — 캔버스 뒤 회색 3×3 라인 (main 양식). 클릭 통과 */
  .dev-grid{position:fixed;inset:0;z-index:1;pointer-events:none}
  .grid-inner{position:absolute;inset:0}
  .gline{position:absolute;background:#dcdcdc;opacity:1}
  .gv{top:0;bottom:0;width:1px;transform:translateX(-.5px)}
  .gh{left:0;right:0;height:1px;transform:translateY(-.5px)}
  .gv1{left:33.333%}.gv2{left:66.667%}.gh1{top:33.333%}.gh2{top:66.667%}

  /* ---- 미니 푸터 (main/index.html 양식) ---- */
  .site-footer{position:fixed;left:0;right:0;bottom:0;z-index:10;
    background:rgba(220,215,205,.95);border-top:1px solid var(--ink);touch-action:auto;
    display:flex;flex-direction:column;
    font-family:var(--mono);font-size:clamp(11px,.85vw,15px);letter-spacing:.06em}
  .site-footer.open{height:33vh}
  .foot-bar{padding:.75em var(--pad);text-align:center;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .foot-links{display:none;flex-direction:column;border-top:1px solid var(--ink)}
  .site-footer:hover .foot-links,.site-footer.open .foot-links{display:flex}
  .foot-link{font:inherit;letter-spacing:inherit;cursor:pointer;width:100%;
    text-align:center;padding:.7em var(--pad);transition:background .15s;
    border:none;background:0 0;color:inherit;text-decoration:none;display:block}
  .foot-link + .foot-link{border-top:1px solid var(--ink)}
  .foot-link:hover,.foot-link.active{background:rgba(200,195,185,.9)}
  .foot-panel{display:none}
  .site-footer.open .foot-panel{display:block;flex:1 1 auto;min-height:0;overflow-y:auto;
    border-top:1px solid var(--ink);padding:1.2em var(--pad);text-align:left;line-height:1.7}
  .foot-content{max-width:680px;margin:0 auto;opacity:.85;
    font-family:var(--mono),"Gothic A1",sans-serif}
  .foot-content h3{font-size:clamp(13px,1vw,18px);letter-spacing:.1em;margin:0 0 .9em}
  .foot-content p{margin:0 0 1em}
  .foot-copy{display:none}
  .site-footer.open .foot-copy{display:block;text-align:center;border-top:1px solid var(--ink);
    padding:.75em var(--pad);font-size:clamp(9px,.7vw,12px);opacity:.5;letter-spacing:.06em}

  /* 로더 — main 양식. */
  #loader{position:fixed;inset:0;z-index:40;background:#bdb6a7;
    display:flex;align-items:center;justify-content:center;
    font-family:var(--mono);font-size:clamp(13px,1vw,18px);color:var(--ink);transition:opacity .6s}
  #loader.gone{opacity:0;pointer-events:none}

  @media (max-width:560px){
    .site-footer.open{height:42vh}
  }
</style>

<body>

<!-- 회색 3×3 dev-grid (장식, 씬 뒤) -->
<div class="dev-grid" aria-hidden="true">
  <div class="grid-inner">
    <div class="gline gv gv1"></div><div class="gline gv gv2"></div>

<div id="scene"></div>

<div id="zoom">1인칭 ↔ 탑뷰<div class="bar"><i id="zoom-fill"></i></div></div>
<div id="hint">바퀴가 지나간 자리에 글자가 새겨집니다 — 스크롤(또는 핀치)로<br>줌아웃하면 바퀴가 새겨 온 자국이 한 지면으로 떠오릅니다</div>

<script type="importmap">
{
  "imports": {
    "three": "https://cdnjs.cloudflare.com/ajax/libs/three.js/0.160.0/three.module.min.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
  }
}
</script>

<script type="module">
import * as THREE from "three";

/* ============================================================
   0. 찍히는 책 본문 (한 페이지). 바퀴가 왕복하며 찍은 줄들.
   ============================================================ */
const PASSAGE =
  "바퀴가 한 바퀴 구를 때마다 한 줄의 문장이 바닥에 새겨진다. " +
  "모래 위의 글자는 읽는 동안에도 천천히 무너져 내린다. " +
  "가까이 서면 한 글자밖에 보이지 않고, 멀리 떠오르면 비로소 한 페이지가 된다. " +
  "당신이 걸어간 자리가 곧 당신이 읽은 문장이며, 멈춘 자리가 마침표다. " +
  "바람이 한 번 불면 페이지는 지워지고, 같은 책은 두 번 다시 펼쳐지지 않는다. " +
  "그래도 바퀴는 멈추지 않고 돌아서서, 다음 줄을 향해 다시 굴러간다. ";
// 페이지 전체 길이를 채우도록 본문을 여러 번 이어 붙인다.
const BOOK = PASSAGE.repeat(30).split("");   // 글자 단위(한글 줄바꿈 처리)

/* ============================================================
   1. 세계 치수
   ============================================================ */
const Wp = 42;          // 지면(페이지) 가로
const Lp = 96;          // 지면 세로(길이) — 마이너스 Z 방향으로 뻗음
const Rw = 2.6;         // 바퀴 반지름 (글자보다 충분히 크게)
const TW = 1.3;         // 타이어 접지 폭 = 글자 한 줄의 월드 높이(= 줄 간격)
                        //   → 바퀴가 한 줄을 정확히 덮으며 굴러가도록 글자/바퀴 크기를 맞춘다.

/* ============================================================
   2. 렌더러 / 씬 / 카메라
   ============================================================ */
const host = document.getElementById("scene");
const renderer = new THREE.WebGLRenderer({ antialias:true });
renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
const VW = ()=>host.clientWidth, VH = ()=>host.clientHeight;
renderer.setSize(VW(), VH());
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.05;
renderer.outputColorSpace = THREE.SRGBColorSpace;
host.appendChild(renderer.domElement);

const scene = new THREE.Scene();
const HORIZON = new THREE.Color(0xcfc8b8);
scene.fog = new THREE.Fog(HORIZON, 30, 165);

// 하늘 그라디언트 배경
scene.background = makeSky();

const camera = new THREE.PerspectiveCamera(58, VW()/VH(), 0.05, 600);

/* ============================================================
   3. 조명 — 낮은 측광으로 글자 홈(그루브)에 그림자가 지게
   ============================================================ */
scene.add(new THREE.HemisphereLight(0xeae3d2, 0x6f6553, 0.9));
const sun = new THREE.DirectionalLight(0xfff3df, 1.7);
sun.position.set(-22, 16, 14);     // 왼쪽 위 앞에서 비스듬히
scene.add(sun);
const rim = new THREE.DirectionalLight(0xbcd0e8, 0.35);
rim.position.set(10, 8, -20);
scene.add(rim);

/* ============================================================
   4. 큰 바닥(모래) — 지면 너머로 멀리 펼쳐짐.
      텍스처 없이 깔끔한 단색(페이지와 같은 모래색). 안개로 지평선에 녹는다.
   ============================================================ */
const ground = new THREE.Mesh(
  new THREE.PlaneGeometry(800, 800),
  new THREE.MeshStandardMaterial({ color:0xc7bfae, roughness:1, metalness:0 })
);
ground.rotation.x = -Math.PI/2;
ground.position.y = -0.02;
scene.add(ground);

/* ============================================================
   5. 페이지 — 처음엔 '빈 모래'. 바퀴가 지나간 자리에만 글자가 음각으로 새겨진다.
      color 텍스처(엠보싱 음각) + bump 텍스처(높이)를 점진적으로 그려 넣는다.
   ============================================================ */
const page = buildPage();            // 빈 캔버스+텍스처 생성. 글자는 carve()로 점차 새김.
const pageMat = new THREE.MeshStandardMaterial({
  color: 0xc7bfae, roughness: 1, metalness: 0,
  map: page.colorTex, bumpMap: page.bumpTex, bumpScale: 0.9
});
const pageMesh = new THREE.Mesh(new THREE.PlaneGeometry(Wp, Lp), pageMat);
pageMesh.rotation.x = -Math.PI/2;
pageMesh.position.set(0, 0.0, -Lp/2);   // Z ∈ [-Lp, 0]
scene.add(pageMesh);

/* ============================================================
   6. 자전거 바퀴 + 트랙(왕복 경로). 바퀴가 굴러간 거리만큼 글자가 새겨진다.
   ============================================================ */
const wheel = makeWheel();
scene.add(wheel.group);
const track = buildTrack(page.layout);   // 글자 줄에 정확히 맞물리는 왕복 경로(직선+끝 전환)

// 폰트 로드 후 글자 배치를 트랙 거리와 매핑(= 바퀴가 그 자리에 닿는 순간 새겨짐)
let carvingReady = false;
function startCarving(){ if (carvingReady) return; page.prepareCarving(track); carvingReady = true; }
if (document.fonts && document.fonts.load){
  document.fonts.load(`400 ${page.layout.fs}px "Black Han Sans"`).then(startCarving).catch(startCarving);
} else { startCarving(); }
setTimeout(startCarving, 1200);          // 폰트가 끝내 안 와도 기본 폰트로

/* ============================================================
   7. 입력 — 줌(스크롤/핀치) + 와리가리(마우스/드래그)
   ============================================================ */
let zoomTarget = 0, zoom = 0;            // 0=1인칭, 1=탑뷰
let mtX = 0, mtY = 0, mX = 0, mY = 0;    // 마우스 목표/현재 (-1..1)

addEventListener("wheel", (e)=>{
  e.preventDefault();
  zoomTarget = clamp(zoomTarget + e.deltaY * 0.0012, 0, 1);
  killHint();
}, { passive:false });

host.addEventListener("pointermove", (e)=>{
  mtX = (e.clientX / VW()) * 2 - 1;
  mtY = (e.clientY / VH()) * 2 - 1;
});

// 터치: 1손가락=훑기, 2손가락=핀치 줌
let pinch0 = null;
host.addEventListener("touchmove", (e)=>{
  if (e.touches.length === 1){
    const t = e.touches[0];
    mtX = (t.clientX/VW())*2-1; mtY = (t.clientY/VH())*2-1;
  } else if (e.touches.length === 2){
    const dx = e.touches[0].clientX - e.touches[1].clientX;
    const dy = e.touches[0].clientY - e.touches[1].clientY;
    const d = Math.hypot(dx, dy);
    if (pinch0 != null) zoomTarget = clamp(zoomTarget + (pinch0 - d)*0.004, 0, 1);
    pinch0 = d;
    killHint();
  }
  e.preventDefault();
}, { passive:false });
host.addEventListener("touchend", ()=>{ pinch0 = null; });

addEventListener("resize", ()=>{
  camera.aspect = VW()/VH();
  camera.updateProjectionMatrix();
  renderer.setSize(VW(), VH());
});

/* ============================================================
   8. 카메라 모핑 — 1인칭(바퀴 추격) ↔ 탑뷰(높고 수직)
      · 1인칭: 바퀴 뒤를 따라가며 바퀴가 화면 위쪽 ~25% 에 걸치고, 진행방향으로
        앞으로 굴러가는 시점. (마우스 영향 없음 — "무조건" 바퀴를 따라간다)
      · 탑뷰: 글자 정렬축(Z=읽는 방향)으로만 살짝 패닝, X 고정, 페이지 안으로 클램프.
   ============================================================ */
const fTan = new THREE.Vector3(0,0,-1);          // 부드럽게 추종하는 진행방향
const eye = new THREE.Vector3();
const fpEye = new THREE.Vector3(), fpTar = new THREE.Vector3();
const topEye = new THREE.Vector3(), topTar = new THREE.Vector3();
const BACK = 17, FPH = 4.0, MID = 8;             // 추격거리 / 눈높이 / 응시점(앞 바닥)
function updateCamera(){
  const z = smooth(zoom);

  // 1인칭(추격): 바퀴 뒤 BACK 만큼, 높이 FPH. 응시는 바퀴 앞 바닥(MID) → 바퀴는 위쪽에.
  fpEye.set(wPos.x - fTan.x*BACK, FPH, wPos.z - fTan.z*BACK);
  fpTar.set(wPos.x - fTan.x*MID, 0,   wPos.z - fTan.z*MID);

  // 탑뷰: Z(읽는 방향)로만 패닝, X=0 고정, 페이지 안으로 클램프.
  const scanZ = clamp(-Lp/2 + mY*(Lp*0.24), -Lp+9, -9);
  topEye.set(0, 90, scanZ + 0.8);
  topTar.set(0, 0,  scanZ);

  // 블렌드
  eye.set(lerp(fpEye.x,topEye.x,z), lerp(fpEye.y,topEye.y,z), lerp(fpEye.z,topEye.z,z));
  camera.position.copy(eye);
  camera.up.set(0, lerp(1, 0.001, z), lerp(0, -1, z)).normalize();
  camera.lookAt(lerp(fpTar.x,topTar.x,z), lerp(fpTar.y,topTar.y,z), lerp(fpTar.z,topTar.z,z));
}

/* ============================================================
   9. 메인 루프
   ============================================================ */
const SPEED = 11;                     // 바퀴 진행 속도(유닛/초)
const clock = new THREE.Clock();
let dist = 0;                         // 바퀴가 경로 위를 달린 거리(현재 위치)
let carveDist = 0;                    // 지금까지 '새겨진' 최대 거리(되돌아가도 유지)
function tick(){
  const dt = Math.min(0.05, clock.getDelta());

  // 부드러운 줌/마우스 추종
  zoom += (zoomTarget - zoom) * Math.min(1, dt*6);
  mX += (mtX - mX) * Math.min(1, dt*5);
  mY += (mtY - mY) * Math.min(1, dt*5);

  // 바퀴 전진 + 굴림. 한 바퀴를 다 돌면 페이지는 다 새겨진 상태로 남는다.
  dist += dt * SPEED;
  if (dist >= track.length){ dist -= track.length; carveDist = track.length; }
  carveDist = Math.max(carveDist, dist);
  placeWheel(dist);
  page.carve(carveDist);              // 바퀴가 닿은 곳까지 글자를 새긴다

  // 진행방향을 부드럽게 추종(끝 U턴에서 카메라가 홱 도는 것을 완화)
  fTan.lerp(wTan, Math.min(1, dt*2.2));
  if (fTan.lengthSq() > 1e-5) fTan.normalize(); else fTan.copy(wTan);

  updateCamera();
  zoomFill.style.width = (zoom*100).toFixed(0) + "%";
  renderer.render(scene, camera);
  requestAnimationFrame(tick);
}
requestAnimationFrame(tick);

/* ============================================================
   ── 헬퍼들 ──────────────────────────────────────────────
   ============================================================ */
function clamp(v,a,b){ return Math.max(a, Math.min(b, v)); }
function lerp(a,b,t){ return a + (b-a)*t; }
function smooth(t){ return t*t*(3-2*t); }

/* 하늘: 위(흐린 청회색) → 지평선(모래빛) 세로 그라디언트 */
function makeSky(){
  const c = document.createElement("canvas"); c.width = 8; c.height = 256;
  const g = c.getContext("2d").createLinearGradient(0,0,0,256);
  g.addColorStop(0.0, "#aab4c0");
  g.addColorStop(0.55, "#c4c4bd");
  g.addColorStop(1.0, "#d2cbbb");
  const x = c.getContext("2d"); x.fillStyle = g; x.fillRect(0,0,8,256);
  const t = new THREE.CanvasTexture(c);
  t.colorSpace = THREE.SRGBColorSpace;
  return t;
}

/* 페이지(빈 모래) 텍스처 + 점진적 음각(carve).
   레이아웃(줄 간격·줄 위치)은 폰트와 무관하게 동기 계산 → 바퀴 트랙과 맞물린다.
   줄 간격(월드) = TW (타이어 접지 폭). 글자는 바퀴가 그 자리에 닿는 순간 하나씩 새긴다. */
function buildPage(){
  const CW = 2000, CH = Math.round(CW * Lp / Wp);     // 페이지 비율(세로로 김)
  const marginX = Math.round(CW * 0.05);
  const lineHpx = TW * CH / Lp;                       // 월드 줄간격이 TW 가 되도록
  const fs = Math.round(lineHpx / 1.95);              // 글자 크기(줄 안에 들어가게)
  const topPad = lineHpx * 0.9;
  const numLines = Math.floor((CH - 2*topPad) / lineHpx);

  const worldZ = (by) => Lp * (by / CH - 1);          // 캔버스 Y(baseline) → 월드 Z
  const worldX = (px) => -Wp/2 + Wp * (px / CW);      // 캔버스 X(px) → 월드 X

  const baselines = [], lineZ = [];
  for (let i=0;i<numLines;i++){
    const by = CH - topPad - i*lineHpx;
    baselines.push(by); lineZ.push(worldZ(by));
  }
  const layout = {
    CW, CH, marginX, fs, lineHpx, numLines, baselines, lineZ,
    xL: worldX(marginX), xR: worldX(CW - marginX),
  };

  const colorC = document.createElement("canvas"); colorC.width=CW; colorC.height=CH;
  const bumpC  = document.createElement("canvas"); bumpC.width=CW;  bumpC.height=CH;
  const cc = colorC.getContext("2d"), bc = bumpC.getContext("2d");
  // 빈 모래(색) + 평평한 높이(중간 회색)로 시작
  cc.fillStyle = "#c7bfae"; cc.fillRect(0,0,CW,CH);
  bc.fillStyle = "#8a8a8a"; bc.fillRect(0,0,CW,CH);

  const colorTex = new THREE.CanvasTexture(colorC);
  colorTex.colorSpace = THREE.SRGBColorSpace;
  colorTex.anisotropy = renderer.capabilities.getMaxAnisotropy();
  const bumpTex = new THREE.CanvasTexture(bumpC);
  bumpTex.anisotropy = renderer.capabilities.getMaxAnisotropy();

  const FONT = `400 ${fs}px "Black Han Sans", sans-serif`;
  let glyphs = null, ptr = 0;

  // 폰트 로드 후: 글자를 줄바꿈하고, 각 글자가 새겨질 '트랙 거리(pd)'를 계산한다.
  function prepareCarving(track){
    cc.font = FONT;
    const maxW = CW - marginX*2;
    const lines = [];
    let line = "";
    for (const ch of BOOK){
      if (lines.length >= numLines) break;
      const test = line + ch;
      if (cc.measureText(test).width > maxW && line){ lines.push(line); line = ch; }
      else line = test;
    }
    if (line && lines.length < numLines) lines.push(line);

    const G = [];
    for (let i=0;i<lines.length;i++){
      const seg = track.lineSeg[i]; if (!seg) break;
      const base = baselines[i];
      let x = marginX;                       // 좌측 정렬(트랙 시작과 맞물림)
      for (const ch of lines[i]){
        const w = cc.measureText(ch).width;
        const gx = worldX(x + w/2);          // 글자 중심의 월드 X
        let t = (gx - seg.sx) / (seg.ex - seg.sx); // 그 줄에서 바퀴가 지나는 비율
        t = clamp(t, 0, 1);
        G.push({ ch, x, b: base, pd: seg.sStart + t*seg.len });
        x += w;
      }
    }
    G.sort((a,b)=>a.pd-b.pd);                 // 바퀴가 닿는 순서대로
    glyphs = G; ptr = 0;
  }

  // 트랙 거리 dist 까지 닿은 글자를 (아직 안 새긴 것만) 음각으로 새긴다.
  function carve(dist){
    if (!glyphs) return;
    let drew = false;
    cc.font = bc.font = FONT;
    cc.textAlign = bc.textAlign = "left";
    cc.textBaseline = bc.textBaseline = "alphabetic";
    while (ptr < glyphs.length && glyphs[ptr].pd <= dist){
      const g = glyphs[ptr++];
      if (g.ch.trim()){
        cc.fillStyle = "rgba(48,40,28,0.85)";   cc.fillText(g.ch, g.x-3, g.b-3);
        cc.fillStyle = "rgba(255,250,238,0.8)"; cc.fillText(g.ch, g.x+3, g.b+3);
        cc.fillStyle = "#7d745f";               cc.fillText(g.ch, g.x,   g.b);
        bc.fillStyle = "#1f1f1f";               bc.fillText(g.ch, g.x,   g.b);
      }
      drew = true;
    }
    if (drew){ colorTex.needsUpdate = true; bumpTex.needsUpdate = true; }
  }

  return { colorTex, bumpTex, layout, prepareCarving, carve };
}

/* 자전거 바퀴 그룹 (타이어 + 림 + 스포크 + 허브).
   토러스는 XY평면, 축(axle)=로컬 Z. 접지 폭(Z방향)을 TW 에 맞춘다(= 글자 한 줄). */
function makeWheel(){
  const group = new THREE.Group();
  const rubber = new THREE.MeshStandardMaterial({ color:0x171717, roughness:0.9 });
  const metal  = new THREE.MeshStandardMaterial({ color:0x9a9a9f, roughness:0.35, metalness:0.85 });
  const tube = TW * 0.5;                 // 타이어 단면 반지름 → Z폭 ≈ TW

  // 타이어
  const tire = new THREE.Mesh(new THREE.TorusGeometry(Rw, tube, 20, 80), rubber);
  group.add(tire);
  // 트레드(글자가 새겨진 면 암시) — 둘레를 따라 박힌 고무 블록, 폭=접지폭
  const tread = new THREE.MeshStandardMaterial({ color:0x242424, roughness:0.98 });
  const NB = 48;
  for (let i=0;i<NB;i++){
    const a = i/NB*Math.PI*2;
    const blk = new THREE.Mesh(new THREE.BoxGeometry(tube*0.5, tube*0.5, TW*0.92), tread);
    blk.position.set(Math.cos(a)*Rw, Math.sin(a)*Rw, 0);
    blk.rotation.z = a;
    group.add(blk);
  }
  // 림
  group.add(new THREE.Mesh(new THREE.TorusGeometry(Rw-tube*0.9, tube*0.16, 10, 80), metal));
  // 허브
  const hub = new THREE.Mesh(new THREE.CylinderGeometry(tube*0.45, tube*0.45, TW*0.9, 18), metal);
  hub.rotation.x = Math.PI/2;
  group.add(hub);
  // 스포크
  for (let i=0;i<18;i++){
    const a = i/18*Math.PI*2;
    const sp = new THREE.Mesh(new THREE.CylinderGeometry(Rw*0.012, Rw*0.012, (Rw-tube*0.9)*2, 6), metal);
    sp.rotation.z = a;
    group.add(sp);
  }
  return { group };
}

/* 왕복 트랙 — 글자 줄(layout.lineZ)을 따라 직선으로 굴러가고, 줄 끝에서 옆으로
   한 줄(TW)만큼 이동해 다음 줄로. 각 구간의 시작 거리(sStart)를 알고 있으므로
   '바퀴가 어떤 글자에 닿는 순간의 거리(pd)'를 정확히 계산할 수 있다.
   lineSeg[i] = i번째 글자 줄에 대응하는 직선 구간(글자 새김 타이밍용). */
function buildTrack(layout){
  const xL = layout.xL + 0.4, xR = layout.xR - 0.4;
  const Z = layout.lineZ, NL = layout.numLines;
  const segs = [], lineSeg = [];
  let d = 0;
  for (let i=0;i<NL;i++){
    const even = i % 2 === 0;
    const sx = even ? xL : xR, ex = even ? xR : xL, z = Z[i];
    const len = Math.abs(ex - sx);
    const seg = { sx, ex, sz:z, ez:z, len, sStart:d };
    segs.push(seg); lineSeg[i] = seg; d += len;
    if (i < NL-1){                          // 줄 끝 → 옆으로 한 줄 이동(전환)
      const z2 = Z[i+1], zlen = Math.abs(z2 - z);
      segs.push({ sx:ex, ex, sz:z, ez:z2, len:zlen, sStart:d }); d += zlen;
    }
  }
  const length = d;
  function posAt(dd, out){
    dd = ((dd % length) + length) % length;
    for (const s of segs){
      if (dd <= s.sStart + s.len){
        const t = s.len ? (dd - s.sStart)/s.len : 0;
        return out.set(lerp(s.sx,s.ex,t), Rw, lerp(s.sz,s.ez,t));
      }
    }
    const e = segs[segs.length-1];
    return out.set(e.ex, Rw, e.ez);
  }
  function tanAt(dd, out){
    dd = ((dd % length) + length) % length;
    for (const s of segs){
      if (dd <= s.sStart + s.len){
        out.set(s.ex - s.sx, 0, s.ez - s.sz);
        if (out.lengthSq() < 1e-6) out.set(1,0,0);
        return out.normalize();
      }
    }
    return out.set(1,0,0);
  }
  return { length, posAt, tanAt, lineSeg };
}

/* 트랙 거리 d 에 바퀴 배치 + 진행방향 정렬 + 굴림 회전.
   현재 바퀴 위치 wPos / 진행방향 wTan 을 (추격 카메라용으로) 보관한다. */
const _basis = new THREE.Matrix4(), _spin = new THREE.Matrix4(), _trans = new THREE.Matrix4();
const _axle = new THREE.Vector3();
const UP = new THREE.Vector3(0,1,0);
const wPos = new THREE.Vector3(), wTan = new THREE.Vector3();
function placeWheel(d){
  track.posAt(d, wPos);
  track.tanAt(d, wTan); wTan.y = 0;
  if (wTan.lengthSq() < 1e-6) wTan.set(1,0,0); else wTan.normalize();
  // 로컬축: X=진행(tangent), Y=up, Z=축(axle, 수평·진행에 수직)
  _axle.set(wTan.z, 0, -wTan.x);          // tangent를 90° 회전
  _basis.makeBasis(wTan, UP, _axle);
  _spin.makeRotationZ(-d / Rw);           // 굴림: 축(로컬 Z) 기준, 진행거리/반지름
  _trans.makeTranslation(wPos.x, wPos.y, wPos.z);
  wheel.group.matrixAutoUpdate = false;
  wheel.group.matrix.copy(_trans).multiply(_basis).multiply(_spin);
}

  about:"itwillneverbethesame.com 에서 출발했다. 자전거 타이어에 새겨진 글자가, 바퀴가 구르며 바닥에 한 줄씩 문장을 찍는다. 가까이 서면 한 글자뿐이지만, 위로 떠오를수록 그 자국 전체가 한 '지면'이 된다. 읽기란 결국 걸어간 자리를 되돌아보는 일이다.",
  wheel:"바퀴는 페이지 위를 뱀처럼 왕복(부스트로페돈)하며 굴러간다. 한 줄을 끝까지 가면 끝에서 돌아 다음 줄로 내려온다. 옛 소가 밭을 갈 듯, 옛 글이 줄을 바꾸듯. 바퀴 둘레에 새겨진 글자가 한 바퀴마다 한 토막씩 모래에 찍힌다.",
  sand:"모래 위의 글자는 음각이다. 빛이 비스듬히 들면 홈마다 그림자가 고여 글자가 떠오른다. 바람(리사이즈·재방문)이 불면 페이지는 매번 새로 찍히고, 같은 책은 두 번 다시 같지 않다. It will never be the same.",
};
const footer = document.getElementById("site-footer");
const footContent = document.getElementById("foot-content");
let openSec = null;
function openSection(btn){
  const sec = btn.dataset.sec;
  if (openSec===sec){ closeFooter(); return; }
  openSec = sec;
  footContent.innerHTML = "";
  const h = document.createElement("h3"); h.textContent = btn.textContent.trim();
  const p = document.createElement("p"); p.textContent = NAV_CONTENT[sec] || "";
  footContent.append(h, p);
  footer.classList.add("open");
  footer.querySelectorAll(".foot-link[data-sec]").forEach(b=>b.classList.toggle("active", b===btn));
}
function closeFooter(){
  openSec=null; footer.classList.remove("open");
  footer.querySelectorAll(".foot-link[data-sec]").forEach(b=>b.classList.remove("active"));
}
footer.querySelectorAll(".foot-link[data-sec]").forEach(b=>b.addEventListener("click", ()=>openSection(b)));
addEventListener("keydown", e=>{ if(e.key==="Escape") closeFooter(); });
