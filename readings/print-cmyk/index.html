<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>BOOKISHNESS</title>
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' fill='%23ffffff'/%3E%3Cg fill='none' stroke='%23231f20' stroke-width='2' stroke-linejoin='round'%3E%3Cpath d='M16 7 C12 5 8 5 5 6 L5 25 C8 24 12 24 16 26 C20 24 24 24 27 25 L27 6 C24 5 20 5 16 7 Z'/%3E%3Cline x1='16' y1='7' x2='16' y2='26'/%3E%3C/g%3E%3C/svg%3E">

<!-- 캔버스 한글 그림용 폰트 (Gothic A1). 하단 푸터 영문엔 영향 없음. -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Gothic+A1&display=swap" rel="stylesheet">

<style>
  :root {
    --ink:#141414; --bg:#ffffff; --dim:#9a9a9a;
    --pink:#ff5bd1; --pad:clamp(14px,1.6vw,30px);
    --mono:ui-monospace,"SFMono-Regular",Menlo,Consolas,monospace;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  html, body { height:100%; overflow:hidden; background:var(--bg); }
  body {
    font-family:var(--mono); color:var(--ink);
    -webkit-user-select:none; user-select:none;
    -webkit-tap-highlight-color:transparent; touch-action:none;
    -moz-osx-font-smoothing:grayscale; -webkit-font-smoothing:antialiased;
  }

  /* 그림이 그려지는 캔버스. z-index 2 (그리드 위). */
  #stage { position:fixed; inset:0; z-index:2; cursor:crosshair; }
  #stage canvas { display:block; width:100%; height:100%; }

  /* 첫 진입 안내 — 한 번 누르면(또는 잠시 뒤) 사라짐. 푸터 위로 띄움. */
  #hint {
    position:fixed; left:50%; bottom:64px; transform:translateX(-50%);
    z-index:9; font-size:14px; color:var(--dim); letter-spacing:.04em;
    transition:opacity .6s; pointer-events:none; text-align:center;
    font-family:var(--mono);
  }
  #hint.gone { opacity:0; }

  /* dev-grid (장식) — 캔버스 뒤 회색 3×3 라인 (main 양식). 클릭 통과 */
  .dev-grid{position:fixed;inset:0;z-index:1;pointer-events:none}
  .grid-inner{position:absolute;inset:0}
  .gline{position:absolute;background:#dcdcdc;opacity:1}
  .gv{top:0;bottom:0;width:1px;transform:translateX(-.5px)}
  .gh{left:0;right:0;height:1px;transform:translateY(-.5px)}
  .gv1{left:33.333%}.gv2{left:66.667%}.gh1{top:33.333%}.gh2{top:66.667%}

  /* ---- 미니 푸터 (main/index.html 양식) ---- */
  .site-footer{position:fixed;left:0;right:0;bottom:0;z-index:10;
    background:var(--bg);border-top:1px solid var(--ink);touch-action:auto;
    display:flex;flex-direction:column;
    font-family:var(--mono);font-size:clamp(11px,.85vw,15px);letter-spacing:.06em}
  .site-footer.open{height:33vh}
  .foot-bar{padding:.75em var(--pad);text-align:center;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .foot-links{display:none;flex-direction:column;border-top:1px solid var(--ink)}
  .site-footer:hover .foot-links,.site-footer.open .foot-links{display:flex}
  .foot-link{font:inherit;letter-spacing:inherit;cursor:pointer;width:100%;
    text-align:center;padding:.7em var(--pad);transition:background .15s;
    border:none;background:0 0;color:inherit;text-decoration:none;display:block}
  .foot-link + .foot-link{border-top:1px solid var(--ink)}
  .foot-link:hover,.foot-link.active{background:#ededed}
  .foot-panel{display:none}
  .site-footer.open .foot-panel{display:block;flex:1 1 auto;min-height:0;overflow-y:auto;
    border-top:1px solid var(--ink);padding:1.2em var(--pad);text-align:left;line-height:1.7}
  .foot-content{max-width:680px;margin:0 auto;opacity:.85;
    font-family:var(--mono),"Gothic A1",sans-serif}
  .foot-content h3{font-size:clamp(13px,1vw,18px);letter-spacing:.1em;margin:0 0 .9em}
  .foot-content p{margin:0 0 1em}
  .foot-copy{display:none}
  .site-footer.open .foot-copy{display:block;text-align:center;border-top:1px solid var(--ink);
    padding:.75em var(--pad);font-size:clamp(9px,.7vw,12px);opacity:.5;letter-spacing:.06em}

  /* 로더 */
  #loader{position:fixed;inset:0;z-index:40;background:var(--bg);
    display:flex;align-items:center;justify-content:center;
    font-family:var(--mono);font-size:clamp(13px,1vw,18px);color:var(--ink);transition:opacity .6s}
  #loader.gone{opacity:0;pointer-events:none}
  #loader .ll{display:inline-block;animation:fxwave 1.3s ease-in-out infinite,fxhue 2.5s infinite;
    animation-delay:calc(var(--i)*-.09s),calc(var(--i)*-.5s);will-change:transform}
  #loader .ll.sp{animation:fxwave 1.3s ease-in-out infinite;animation-delay:calc(var(--i)*-.09s)}
  @keyframes fxwave{0%,100%{transform:translateY(.32em)}50%{transform:translateY(-.32em)}}
  @keyframes fxhue{
    0%,19.9%{color:#b6ff66}  20%,39.9%{color:#6ec9ff} 40%,59.9%{color:#ff9d4e}
    60%,79.9%{color:#ff7bc4} 80%,100%{color:#b08bff}}

  @media (max-width:560px){
    .site-footer.open{height:42vh}
  }
</style>
</head>
<body>

<!-- 회색 3×3 dev-grid (장식, 캔버스 뒤) -->
<div class="dev-grid" aria-hidden="true">
  <div class="grid-inner">
    <div class="gline gv gv1"></div><div class="gline gv gv2"></div>
    <div class="gline gh gh1"></div><div class="gline gh gh2"></div>
  </div>
</div>

<div id="hint">네 색판이 어긋나 있습니다 · 드래그해 판을 정합(register)하면 글이 또렷해집니다</div>

<div id="stage"><canvas id="cv"></canvas></div>

<!-- 미니 푸터 (main 양식) -->
<footer class="site-footer" id="site-footer">
  <div class="foot-bar">BOOKISHNESS /// 100 EXPERIMENTS IN READING ON SCREEN</div>
  <nav class="foot-links">
    <button class="foot-link" data-sec="about">ABOUT</button>
    <button class="foot-link" data-sec="how">HOW</button>
    <button class="foot-link" data-sec="note">NOTE</button>
    <a class="foot-link" href="../../main/index.html">← BACK TO BOX</a>
  </nav>
  <div class="foot-panel"><div class="foot-content" id="foot-content"></div></div>
  <div class="foot-copy">Bookishness © 2026 Seeun Kim. All rights reserved.</div>
</footer>

<div id="loader" aria-label="Loading Digital Fluxbox"></div>
<script>(function(){var el=document.getElementById('loader'),t='Loading Digital Fluxbox';for(var i=0;i<t.length;i++){var c=t.charAt(i),s=document.createElement('span');s.className='ll'+(c===' '?' sp':'');s.style.setProperty('--i',i);if(c===' ')s.innerHTML='&nbsp;';else s.textContent=c;el.appendChild(s);}})();</script>

<script>
/* ============================================================
   캔버스 셋업 (레티나 대응) — 모든 piece 공통
   ============================================================ */
const cv  = document.getElementById("cv");
const ctx = cv.getContext("2d");
const stage = document.getElementById("stage");
const hint  = document.getElementById("hint");
let W = 0, H = 0, DPR = 1;

function resize(){
  DPR = Math.min(window.devicePixelRatio||1, 2);
  W = window.innerWidth; H = window.innerHeight;
  cv.width = W*DPR; cv.height = H*DPR;
  ctx.setTransform(DPR,0,0,DPR,0,0);
  if (typeof onResize === "function") onResize();
}
window.addEventListener("resize", resize);

/* ============================================================
   PIECE LOGIC — CMYK 오프셋 정합 (CMYK Register)
   읽기방식: 어긋난 색판을 맞춰 읽기. 같은 한 문장이 C·M·Y·K
   네 색판으로 각각 따로 인쇄돼, 미세하게 어긋나(미스레지스트레이션)
   유령처럼 번져 보인다. 드래그로 판을 밀어 제자리(원점)로 모으면
   네 판이 겹쳐 K(검정) 글자가 또렷해진다. 모서리엔 정합 표적
   (레지스터 마크)이 흐리게 있고, 어긋남 정도가 수치로 보인다.
   정합 = 읽기.
   ============================================================ */

const LINES = [
  "인쇄의 본질은 반복이다",
  "같은 문장을 네 번 찍는다",
  "어긋남이 맞춰질 때 글이 된다",
];
let lineIdx = 0;

// 네 색판 (인쇄 순서: C M Y K). 각 판은 원점에서의 오프셋을 가진다.
const PLATES = [
  { key:"C", color:"#00aeef", ox:0, oy:0, hx:0, hy:0 },
  { key:"M", color:"#ec008c", ox:0, oy:0, hx:0, hy:0 },
  { key:"Y", color:"#fff200", ox:0, oy:0, hx:0, hy:0 },
  { key:"K", color:"#141414", ox:0, oy:0, hx:0, hy:0 },
];
// 각 판의 "흐트러진" 목표 오프셋(정합되지 않은 상태)
const SCATTER = [
  {x:-1.0, y:-0.7}, {x:0.9, y:-0.5}, {x:-0.5, y:0.9}, {x:0.7, y:0.6},
];

let dragging = null;     // 현재 잡은 판
let dragStart = {x:0,y:0};
let plateStart = {x:0,y:0};
let pointer = {x:0,y:0,down:false};
let fontSize = 60;
let baseOffset = 26;     // 흐트러짐 진폭(px) — onResize 에서

function onResize(){
  fontSize = Math.min(W*0.085, 86);
  ctx.font = `800 ${fontSize}px "Gothic A1",ui-monospace,sans-serif`;
  // 문장이 화면 폭을 넘으면 줄임
  while (ctx.measureText(LINES[lineIdx]).width > W*0.74 && fontSize>22){
    fontSize *= 0.94;
    ctx.font = `800 ${fontSize}px "Gothic A1",ui-monospace,sans-serif`;
  }
  baseOffset = Math.min(34, Math.max(16, fontSize*0.42));
  scatterPlates();
}

function scatterPlates(){
  for (let i=0;i<PLATES.length;i++){
    PLATES[i].ox = PLATES[i].hx = SCATTER[i].x*baseOffset;
    PLATES[i].oy = PLATES[i].hy = SCATTER[i].y*baseOffset;
  }
}

// 정합도: 모든 판 오프셋이 0에 가까울수록 1
function registration(){
  let err = 0;
  for (const p of PLATES) err += Math.hypot(p.ox, p.oy);
  const maxErr = baseOffset*4*1.2;
  return Math.max(0, 1 - err/maxErr);
}

/* 화면 중앙 문장 좌표 */
function textPos(){ return { x: W/2, y: H*0.5 }; }

/* 어느 판을 잡았는지: 잡은 지점에서 가장 가까운, 글자 영역 안의 판 */
function pickPlate(x,y){
  const {x:cx, y:cy} = textPos();
  ctx.font = `800 ${fontSize}px "Gothic A1",ui-monospace,sans-serif`;
  const tw = ctx.measureText(LINES[lineIdx]).width;
  // 글자 박스 밖이면 무시
  if (Math.abs(x-cx) > tw/2 + baseOffset*4 || Math.abs(y-cy) > fontSize*0.9 + baseOffset*4) return null;
  let best=null, bd=1e9;
  for (const p of PLATES){
    const d = Math.hypot((cx+p.ox)-x, (cy+p.oy)-y);
    if (d<bd){ bd=d; best=p; }
  }
  return best;
}

/* ---------- 그리기 ---------- */
function drawRegMarks(){
  // 모서리 레지스터 마크 (십자 + 원 표적)
  ctx.save();
  ctx.strokeStyle = "rgba(20,20,20,0.28)";
  ctx.lineWidth = 1;
  const m = Math.min(W,H)*0.08 + 24;
  const corners = [[m,m],[W-m,m],[m,H-m],[W-m,H-m]];
  const r = Math.min(W,H)*0.022 + 8;
  for (const [x,y] of corners){
    ctx.beginPath(); ctx.arc(x,y,r,0,Math.PI*2); ctx.stroke();
    ctx.beginPath(); ctx.arc(x,y,r*0.5,0,Math.PI*2); ctx.stroke();
    ctx.beginPath();
    ctx.moveTo(x-r*1.6,y); ctx.lineTo(x+r*1.6,y);
    ctx.moveTo(x,y-r*1.6); ctx.lineTo(x,y+r*1.6);
    ctx.stroke();
  }
  // 상단 색 바 (CMYK 인쇄 컬러바)
  const bw = Math.min(W*0.04, 40), bh = bw*0.55;
  let bx = W/2 - bw*2 - bw*1.5*1.5;
  const by = H*0.86;
  PLATES.forEach((p,i)=>{
    ctx.fillStyle = p.color;
    ctx.globalAlpha = 0.85;
    ctx.fillRect(W/2 - bw*2.4 + i*bw*1.25, by, bw, bh);
  });
  ctx.globalAlpha=1;
  ctx.strokeStyle="rgba(20,20,20,0.3)";
  ctx.strokeRect(W/2 - bw*2.4, by, bw*1.25*3 + bw, bh);
  ctx.restore();
}

function drawText(){
  const {x:cx, y:cy} = textPos();
  const txt = LINES[lineIdx];
  ctx.save();
  ctx.textAlign="center"; ctx.textBaseline="middle";
  ctx.font = `800 ${fontSize}px "Gothic A1",ui-monospace,sans-serif`;
  // multiply 로 색판이 겹칠 때 어두워지며 K 글자에 수렴
  ctx.globalCompositeOperation = "multiply";
  const reg = registration();
  // 정합될수록 CMY 투명도를 낮춰 K 가 또렷이 드러나게
  for (const p of PLATES){
    if (p.key === "K"){
      ctx.globalAlpha = 1;
      ctx.fillStyle = p.color;
    } else {
      // 흐릿할 땐 색판이 진하게 번지고, 정합되면 옅어짐
      ctx.globalAlpha = 0.45 + 0.4*(1-reg);
      ctx.fillStyle = p.color;
    }
    ctx.fillText(txt, cx + p.ox, cy + p.oy);
  }
  ctx.restore();
}

function drawHud(){
  const reg = registration();
  const pct = Math.round(reg*100);
  ctx.save();
  ctx.textAlign="center"; ctx.textBaseline="alphabetic";
  // 정합 게이지
  const gw = Math.min(W*0.3, 320), gh = 6;
  const gx = W/2 - gw/2, gy = H*0.74;
  ctx.fillStyle = "rgba(20,20,20,0.1)";
  ctx.fillRect(gx, gy, gw, gh);
  ctx.fillStyle = reg>0.97 ? "#141414" : "#ff5bd1";
  ctx.fillRect(gx, gy, gw*reg, gh);
  ctx.strokeStyle="rgba(20,20,20,0.25)"; ctx.lineWidth=1;
  ctx.strokeRect(gx,gy,gw,gh);
  // 수치
  ctx.fillStyle = "#9a9a9a";
  ctx.font = `400 ${Math.max(11, fontSize*0.2)}px ui-monospace,monospace`;
  let err = 0; for (const p of PLATES) err += Math.hypot(p.ox,p.oy);
  ctx.fillText(`MISREGISTRATION  ${err.toFixed(0)}px   ·   REGISTER ${pct}%`, W/2, gy - 14);
  if (reg>0.985){
    ctx.fillStyle="#141414";
    ctx.font = `600 ${Math.max(12, fontSize*0.24)}px "Gothic A1",ui-monospace,sans-serif`;
    ctx.fillText("정합 완료 — 다음 판으로 넘기려면 클릭", W/2, gy + 30);
  }
  ctx.restore();
}

let last = 0;
function frame(t){
  const dt = Math.min(40, t-last); last = t;
  ctx.setTransform(DPR,0,0,DPR,0,0);
  ctx.clearRect(0,0,W,H);

  // 잡지 않은 판은 미세하게 떨림(인쇄기 진동) — 정합 안 됐을 때만
  const reg = registration();
  for (const p of PLATES){
    if (p===dragging) continue;
    if (reg < 0.985){
      const jit = (1-reg)*0.6;
      p.ox = p.hx + Math.sin(t/300 + p.oy)*jit;
      p.oy = p.hy + Math.cos(t/260 + p.ox)*jit;
    }
  }

  drawRegMarks();
  drawText();
  drawHud();

  requestAnimationFrame(frame);
}

/* ---------- 입력 ---------- */
function localXY(e){
  const r = cv.getBoundingClientRect();
  return { x: e.clientX-r.left, y: e.clientY-r.top };
}

stage.addEventListener("pointerdown", (e)=>{
  const {x,y} = localXY(e);
  hint.classList.add("gone");
  pointer.x=x; pointer.y=y; pointer.down=true;

  // 이미 정합 완료 상태면 클릭으로 다음 문장
  if (registration() > 0.985){
    lineIdx = (lineIdx+1) % LINES.length;
    onResize();
    return;
  }
  const p = pickPlate(x,y);
  if (p){
    dragging = p;
    dragStart.x=x; dragStart.y=y;
    plateStart.x=p.ox; plateStart.y=p.oy;
    try{ stage.setPointerCapture(e.pointerId); }catch(_){}
  }
});

window.addEventListener("pointermove", (e)=>{
  if (!pointer.down || !dragging) return;
  const {x,y} = localXY(e);
  let nx = plateStart.x + (x - dragStart.x);
  let ny = plateStart.y + (y - dragStart.y);
  // 원점 근처에서 스냅(자석) — 정합 쾌감
  if (Math.abs(nx) < 4) nx = 0;
  if (Math.abs(ny) < 4) ny = 0;
  // 과도한 이동 제한
  const lim = baseOffset*5;
  nx = Math.max(-lim, Math.min(lim, nx));
  ny = Math.max(-lim, Math.min(lim, ny));
  dragging.ox = dragging.hx = nx;
  dragging.oy = dragging.hy = ny;
});

window.addEventListener("pointerup", ()=>{
  pointer.down=false;
  dragging = null;
});

resize();
requestAnimationFrame(frame);
setTimeout(()=>hint.classList.add("gone"), 6000);

/* ============================================================
   하단 미니 푸터 (main 양식)
   ============================================================ */
const NAV_CONTENT = {
  about: "CMYK 오프셋 정합 (CMYK Register) — 한 문장이 청록·자홍·노랑·검정 네 색판으로 따로 인쇄되어, 미세하게 어긋난 채 유령처럼 번져 보인다(미스레지스트레이션). 색판을 하나씩 밀어 원점으로 모으면 네 판이 겹쳐 검정 글자가 또렷해진다. 어긋남을 맞추는 일이 곧 읽는 일이다.",
  how:   "번진 글자 위에서 색판(C·M·Y·K) 하나를 잡아 끌어 제자리로 민다. 네 판이 모두 정합되면 글이 또렷해지고, 클릭하면 다음 문장으로 넘어간다.",
  note:  "오프셋 인쇄에서 한 페이지는 단 한 번에 찍히지 않는다. 같은 글자를 네 번, 네 색으로 거듭 찍어 겹친다 — 인쇄의 본질은 반복이라는 매클루언의 말 그대로다. 판이 조금이라도 어긋나면 글자는 색의 잔상으로 흩어져 읽히지 않는다. 여기서 독자는 의미를 해독하기 전에 먼저 매체의 어긋남을 손으로 맞춰야 한다. 정합의 순간, 네 번 반복된 흔적이 비로소 하나의 검은 문장으로 수렴한다.",
};
const footer = document.getElementById("site-footer");
const footContent = document.getElementById("foot-content");
let openSec = null;
function openSection(btn){
  const sec = btn.dataset.sec;
  if (openSec===sec){ closeFooter(); return; }
  openSec = sec;
  footContent.innerHTML = "";
  const h = document.createElement("h3"); h.textContent = btn.textContent.trim();
  const p = document.createElement("p"); p.textContent = NAV_CONTENT[sec] || "";
  footContent.append(h, p);
  footer.classList.add("open");
  footer.querySelectorAll(".foot-link[data-sec]").forEach(b=>b.classList.toggle("active", b===btn));
}
function closeFooter(){
  openSec=null; footer.classList.remove("open");
  footer.querySelectorAll(".foot-link[data-sec]").forEach(b=>b.classList.remove("active"));
}
footer.querySelectorAll(".foot-link[data-sec]").forEach(b=>b.addEventListener("click", ()=>openSection(b)));
addEventListener("keydown", e=>{ if(e.key==="Escape") closeFooter(); });

/* 로더 숨김 */
(function(){
  const hide=()=>{ const l=document.getElementById("loader"); if(l) l.classList.add("gone"); };
  addEventListener("load", hide); setTimeout(hide, 1200);
})();
</script>
</body>
</html>
