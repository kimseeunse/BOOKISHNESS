<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Screen Book</title>
<style>
  /* ============================================================
     스크린 책 100프로젝트 · three.js 출발점
     이 파일은 "박스 GLB가 나오기 전에 미리 만들어 두는 작업대"입니다.
     GLB가 준비되면 아래 CONFIG.modelURL 한 줄만 바꾸면 됩니다.
     ============================================================ */
  :root {
    --ink: #1a1a1a;
    --dim: #6a6a6a;
    --bg: #ffffff;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { height: 100%; overflow: hidden; background: var(--bg); }
  body {
    font-family: "Cormorant Garamond", "Nanum Myeongjo", Georgia, serif;
    color: var(--ink);
  }
  #scene { position: fixed; inset: 0; display: block; }

  /* 로딩 오버레이 */
  #loading {
    position: fixed; inset: 0; z-index: 20;
    background: var(--bg);
    display: flex; align-items: center; justify-content: center;
    transition: opacity 0.8s;
  }
  #loading.hidden { opacity: 0; pointer-events: none; }
</style>
</head>
<body>

<div id="loading"></div>

<canvas id="scene"></canvas>

<!-- three.js (ESM, CDN) -->
<script type="importmap">
{
  "imports": {
    "three": "https://cdnjs.cloudflare.com/ajax/libs/three.js/0.160.0/three.module.min.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
  }
}
</script>

<script type="module">
import * as THREE from "three";
import { OrbitControls } from "three/addons/controls/OrbitControls.js";
import { GLTFLoader } from "three/addons/loaders/GLTFLoader.js";
import { RGBELoader } from "three/addons/loaders/RGBELoader.js";

/* ============================================================
   CONFIG — 여기만 만지면 됩니다
   ============================================================ */
const CONFIG = {
  // 박스 GLB가 준비되면 여기에 경로를 넣으세요. (예: "models/box.glb")
  // 비워두면( null ) 임시 박스가 대신 표시됩니다.
  modelURL: "models/box.glb",

  // HDRI 환경맵 — 금속·유리가 "반응할 빛"을 만들어 줍니다.
  // Poly Haven 등에서 받은 .hdr 파일 경로로 교체하세요.
  // 비워두면 코드로 만든 기본 환경(그라데이션 하늘)을 씁니다.
  hdriURL: null,

  // 뚜껑이 열리는 각도(라디안). -110도 정도가 자연스럽습니다.
  lidOpenAngle: THREE.MathUtils.degToRad(110),
};

/* ============================================================
   기본 세팅 — 렌더러 / 씬 / 카메라
   ============================================================ */
const canvas = document.getElementById("scene");
const renderer = new THREE.WebGLRenderer({ canvas, antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));

// ── 톤매핑: 섭페인터 화면과 색감을 맞추는 핵심 ──
// ACESFilmic = 영화적인 색 압축. exposure로 전체 밝기 조절.
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.5;
renderer.outputColorSpace = THREE.SRGBColorSpace;

const scene = new THREE.Scene();

// 카메라 — 살짝 부감(위에서 내려다보는 각도).
// 박스 뚜껑이 뒤로 젖혀질 때 잘 보이도록.
const camera = new THREE.PerspectiveCamera(
  42, window.innerWidth / window.innerHeight, 0.1, 100
);
camera.position.set(2.6, 2.2, 3.4);

// OrbitControls — 마우스로 박스 주위를 둘러보기.
const controls = new OrbitControls(camera, canvas);
controls.enableDamping = true;        // 부드러운 감속
controls.dampingFactor = 0.07;
controls.minDistance = 1.6;
controls.maxDistance = 8;
controls.maxPolarAngle = Math.PI * 0.52;  // 바닥 아래로는 못 내려가게
controls.target.set(0, 0.3, 0);

/* ============================================================
   조명 — HDRI 환경맵 (PBR 재질이 살아나는 이유)
   ============================================================ */
const pmrem = new THREE.PMREMGenerator(renderer);
pmrem.compileEquirectangularShader();

function applyProceduralEnvironment() {
  // HDRI 파일이 없을 때 쓰는 기본 환경.
  // 위는 밝고 아래는 어두운 그라데이션 하늘 — 금속에 비칠 "환경"이 생깁니다.
  const c = document.createElement("canvas");
  c.width = 16; c.height = 128;
  const ctx = c.getContext("2d");
  // 위는 밝고 아래는 부드럽게 이어지는 환경 — 모델에 입체감을 줍니다.
  const grad = ctx.createLinearGradient(0, 0, 0, 128);
  grad.addColorStop(0,   "#ffffff");
  grad.addColorStop(0.4, "#f0f0f0");
  grad.addColorStop(1,   "#d8d8d8");
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, 16, 128);
  const tex = new THREE.CanvasTexture(c);
  tex.mapping = THREE.EquirectangularReflectionMapping;
  const envRT = pmrem.fromEquirectangular(tex);
  scene.environment = envRT.texture;
  scene.background = new THREE.Color("#ffffff");
  tex.dispose();
}

function applyHDRI(url, onDone) {
  new RGBELoader().load(
    url,
    (hdr) => {
      hdr.mapping = THREE.EquirectangularReflectionMapping;
      const envRT = pmrem.fromEquirectangular(hdr);
      scene.environment = envRT.texture;   // 재질 반사용
      scene.background = new THREE.Color("#ffffff"); // 배경은 어둡게 유지
      hdr.dispose();
      onDone && onDone();
    },
    undefined,
    () => { applyProceduralEnvironment(); onDone && onDone(); }
  );
}

// 환경광 — 전체 장면을 기본으로 밝혀줍니다.
const ambientLight = new THREE.AmbientLight(0xffffff, 0.9);
scene.add(ambientLight);

// 키라이트 — 메인 방향광, 형태와 하이라이트를 만듭니다.
const keyLight = new THREE.DirectionalLight(0xfff8f0, 2.5);
keyLight.position.set(3, 5, 2);
scene.add(keyLight);

// 필라이트 — 반대편 그림자를 부드럽게 채워줍니다.
const fillLight = new THREE.DirectionalLight(0xf0f4ff, 1.8);
fillLight.position.set(-3, 1, -2);
scene.add(fillLight);

// 탑라이트 — 위에서 내려오는 빛으로 모델 상단을 밝힙니다.
const topLight = new THREE.DirectionalLight(0xffffff, 0.5);
topLight.position.set(0, 8, 0);
scene.add(topLight);

/* ============================================================
   재질 예시 — 플라스틱과 양식화된 유리
   GLB에 재질이 이미 들어있으면 이건 참고용입니다.
   ============================================================ */

// 플라스틱: MeshStandardMaterial로 충분. metalness 0, roughness로 광택 조절.
function makePlastic(color) {
  return new THREE.MeshStandardMaterial({
    color: color,
    metalness: 0.0,
    roughness: 0.35,   // 낮을수록 반질, 높을수록 무광
  });
}

// 양식화된 유리: 진짜 굴절 대신 가볍게. transmission 살짝 + 투명도.
// 모래시계 유리 등에 사용. 무거운 사실적 유리를 피하는 선택.
function makeStylizedGlass(tint) {
  return new THREE.MeshPhysicalMaterial({
    color: tint,
    metalness: 0.0,
    roughness: 0.12,
    transmission: 0.7,   // 빛 통과 (0=불투명, 1=완전투과)
    thickness: 0.5,
    transparent: true,
    opacity: 0.85,
    ior: 1.3,
  });
}

// 금속 예시 (열쇠 등): metalness 1, 환경맵이 있어야 살아납니다.
function makeMetal(color) {
  return new THREE.MeshStandardMaterial({
    color: color,
    metalness: 1.0,
    roughness: 0.3,
  });
}

/* ============================================================
   임시 박스 — 진짜 GLB가 없을 때 보여주는 자리표시용
   lid / base 구조를 똑같이 흉내내서, 클릭-열기 로직을 미리 테스트.
   ============================================================ */
function buildPlaceholderBox() {
  const root = new THREE.Group();
  root.name = "placeholder-box";

  const woodDark = makePlastic("#4a3b28");
  const woodLid = makePlastic("#5a4832");

  // 몸체(base) — 안쪽이 보이도록 5면짜리 상자
  const base = new THREE.Group();
  base.name = "base";
  const wall = 0.06, w = 1.8, d = 1.3, h = 0.7;
  const floor = new THREE.Mesh(new THREE.BoxGeometry(w, wall, d), woodDark);
  floor.position.y = wall / 2;
  base.add(floor);
  const mkWall = (sw, sh, sd, x, y, z) => {
    const m = new THREE.Mesh(new THREE.BoxGeometry(sw, sh, sd), woodDark);
    m.position.set(x, y, z);
    base.add(m);
  };
  mkWall(w, h, wall, 0, h / 2, -d / 2 + wall / 2);   // 뒤
  mkWall(w, h, wall, 0, h / 2,  d / 2 - wall / 2);    // 앞
  mkWall(wall, h, d, -w / 2 + wall / 2, h / 2, 0);    // 왼
  mkWall(wall, h, d,  w / 2 - wall / 2, h / 2, 0);    // 오
  root.add(base);

  // 뚜껑(lid) — 핵심: 그룹의 원점을 "경첩"에 둔다.
  // 그래야 회전이 경첩을 축으로 일어남.
  const lid = new THREE.Group();
  lid.name = "lid";
  const hingeZ = -d / 2 + wall / 2;   // 뒷면 = 경첩 위치
  lid.position.set(0, h, hingeZ);     // 그룹 원점을 경첩으로 이동
  const lidPanel = new THREE.Mesh(new THREE.BoxGeometry(w, wall, d), woodLid);
  // 패널은 그룹 원점(경첩)에서 앞쪽으로 d/2 만큼 떨어진 곳에 놓임
  lidPanel.position.set(0, 0, d / 2);
  lid.add(lidPanel);
  root.add(lid);

  return root;
}

/* ============================================================
   모델 로드 — GLB가 있으면 GLB, 없으면 임시 박스
   ============================================================ */
let lidGroup = null;       // 뚜껑 (클릭하면 회전할 대상)
let lidClosedRot = 0;      // 닫힌 상태 각도
let isOpen = false;
let isAnimatingLid = false;

function registerModel(root) {
  scene.add(root);
  // 'lid' 라는 이름의 그룹을 찾아서 뚜껑으로 등록
  lidGroup = root.getObjectByName("lid");
  if (lidGroup) {
    lidClosedRot = lidGroup.rotation.z;
  }
}

function loadModel() {
  if (!CONFIG.modelURL) {
    // GLB 없음 → 임시 박스
    registerModel(buildPlaceholderBox());
    finishLoading();
    return;
  }
  new GLTFLoader().load(
    CONFIG.modelURL,
    (gltf) => { registerModel(gltf.scene); finishLoading(); },
    undefined,
    (err) => {
      registerModel(buildPlaceholderBox());
      finishLoading();
    }
  );
}

/* ============================================================
   뚜껑 열기 / 닫기 — three.js에서 직접 회전 제어
   (GLB에 애니메이션을 굽지 않고 코드로 제어하는 방식)
   ============================================================ */
const raycaster = new THREE.Raycaster();
const pointer = new THREE.Vector2();

canvas.addEventListener("pointerdown", (e) => {
  if (!lidGroup || isAnimatingLid) return;
  pointer.x = (e.clientX / window.innerWidth) * 2 - 1;
  pointer.y = -(e.clientY / window.innerHeight) * 2 + 1;
  raycaster.setFromCamera(pointer, camera);
  // 뚜껑 그룹 안의 어떤 메시든 클릭되면 토글
  const hits = raycaster.intersectObject(lidGroup, true);
  if (hits.length > 0) toggleLid();
});

function toggleLid() {
  isOpen = !isOpen;
  isAnimatingLid = true;
  const from = lidGroup.rotation.z;
  const to = isOpen ? lidClosedRot + CONFIG.lidOpenAngle : lidClosedRot;
  const dur = 850;
  const t0 = performance.now();

  function step(now) {
    let k = Math.min((now - t0) / dur, 1);
    // easeOutCubic — 끝에서 부드럽게 감속
    const e = 1 - Math.pow(1 - k, 3);
    lidGroup.rotation.z = from + (to - from) * e;
    if (k < 1) {
      requestAnimationFrame(step);
    } else {
      isAnimatingLid = false;
    }
  }
  requestAnimationFrame(step);
}

/* ============================================================
   유틸 — 상태 표시 / 로딩 종료 / 리사이즈
   ============================================================ */
function finishLoading() {
  document.getElementById("loading").classList.add("hidden");
}
window.addEventListener("resize", () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

/* ============================================================
   시작
   ============================================================ */
function start() {
  if (CONFIG.hdriURL) {
    applyHDRI(CONFIG.hdriURL, loadModel);
  } else {
    applyProceduralEnvironment();
    loadModel();
  }
  animate();
}

function animate() {
  requestAnimationFrame(animate);
  controls.update();
  renderer.render(scene, camera);
}

start();
</script>
</body>
</html>
